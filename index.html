<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#f2f2f4" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Scan to Gym</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div class="brand-mark" aria-hidden="true">◖</div>
        <h1>PureGym</h1>
        <button id="user-menu-toggle" type="button" class="menu-btn hidden" aria-label="Toggle sidebar menu" aria-expanded="false" data-1p-ignore>☰ Menu</button>
      </header>

      <aside id="user-menu" class="user-menu hidden" aria-live="polite">
        <button id="logout-btn" type="button" class="secondary-btn logout-btn" data-1p-ignore>Logout</button>
      </aside>

      <section id="login-view" class="card">
        <p class="eyebrow">PUREGYM</p>
        <h2 class="member-title">Member Login</h2>
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required />

        <label for="pin">PIN</label>
        <input id="pin" type="password" inputmode="numeric" autocomplete="current-password" required />

        <button id="login-btn" type="button" class="primary-btn">Login</button>
        <p id="login-error" class="error hidden"></p>
      </section>

      <section id="qr-view" class="card hidden">
        <div class="qr-header">
          <button id="manual-refresh-btn" type="button" class="refresh-btn" aria-label="Refresh QR code" data-1p-ignore>⟳ Refresh QR</button>
        </div>

        <p class="eyebrow expires-label">EXPIRES</p>
        <p id="qr-expiry" class="expiry-text"></p>
        <p id="member-pin" class="member-pin hidden"></p>

        <div id="qr-container" class="qr-container"></div>
        <p id="qr-refreshing" class="refreshing hidden">Refreshing in background…</p>
        <p id="qr-error" class="error hidden"></p>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
