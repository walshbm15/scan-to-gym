<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#f2f2f4" />
    <title>Scan to Gym</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div class="brand-mark" aria-hidden="true">◖</div>
        <h1>PureGym</h1>
        <button id="user-menu-toggle" class="icon-btn hidden" aria-label="Open user menu">☰</button>
      </header>

      <aside id="user-menu" class="user-menu hidden" aria-live="polite">
        <button id="user-menu-name" class="user-name-btn"></button>
        <div id="user-menu-content" class="hidden">
          <button id="logout-btn" class="secondary-btn">Logout</button>
        </div>
      </aside>

      <section id="login-view" class="card">
        <p class="eyebrow">PUREGYM</p>
        <h2 class="member-title">Member Login</h2>
        <label for="username">Username</label>
        <input id="username" type="text" autocomplete="username" required />

        <label for="pin">PIN</label>
        <input id="pin" type="password" inputmode="numeric" autocomplete="current-password" required />

        <button id="login-btn" class="primary-btn">Login</button>
        <p id="login-error" class="error hidden"></p>
      </section>

      <section id="qr-view" class="card hidden">
        <p class="eyebrow">PUREGYM</p>
        <div class="qr-header">
          <h2 class="member-title">ACTIVE MEMBER</h2>
          <button id="manual-refresh-btn" class="icon-btn" aria-label="Refresh QR code">⟳</button>
        </div>

        <p class="eyebrow expires-label">EXPIRES</p>
        <p id="qr-expiry" class="expiry-text"></p>

        <div id="qr-container" class="qr-container"></div>
        <p id="qr-refreshing" class="refreshing hidden">Refreshing in background…</p>
        <p id="qr-error" class="error hidden"></p>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
